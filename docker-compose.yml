version: '3.8'
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports: ['3000:3000']
    env_file: ./frontend/.env.local
    depends_on: [backend]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports: ['4000:4000']
    env_file: ./backend/.env
    volumes: ['./backend/uploads:/app/uploads']
    depends_on: [mongo, redis]

  mongo:
    image: mongo:7
    ports: ['27017:27017']
    volumes: ['mongo_data:/data/db']
    environment:
      MONGO_INITDB_DATABASE: vedaai

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
    command: redis-server --appendonly yes
    volumes: ['redis_data:/data']

volumes:
  mongo_data:
  redis_data:
